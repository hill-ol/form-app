# Local test rig: a throwaway Postgres + PostgREST, wired up exactly like
# the production setup (Neon + Fly.io) will be. Use this to confirm the
# schema and API work end-to-end before touching real infrastructure.
#
# Run from this directory:
#   docker compose up
# Then point .env.local at http://localhost:3001 (see postgrest/README.md).
# Tear down and wipe the throwaway DB with:
#   docker compose down -v

services:
  db:
    image: postgres:16
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: formapp
    ports:
      - "5432:5432"
    volumes:
      - ../db/schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro
      - db-data:/var/lib/postgresql/data

  postgrest:
    image: postgrest/postgrest:v12.2.3
    depends_on:
      - db
    ports:
      - "3001:3000"
    environment:
      PGRST_DB_URI: postgres://web_anon:change-me-before-deploying@db:5432/formapp
      PGRST_DB_SCHEMA: public
      PGRST_DB_ANON_ROLE: web_anon
      PGRST_SERVER_PORT: "3000"
      PGRST_DB_PREPARED_STATEMENTS: "false"

volumes:
  db-data:
